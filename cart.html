<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — E-Shop</title>
    <meta name="description" content="Review your shopping cart, update quantities, and proceed to checkout.">
    <link rel="stylesheet" href="styles/main.min.css">
</head>

<body>

    <!-- ====== HEADER / NAVBAR ====== -->
    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">
                <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="icon-logo">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg></span>
                <span class="logo-text">E-Shop</span>
            </a>

            <nav class="header__nav" id="navMenu">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                    <li class="nav__item"><a href="index.html#products" class="nav__link">Products</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                    <li class="nav__item" id="authNavItem"><a href="login.html" class="nav__link">Login</a></li>
                </ul>
            </nav>

            <div class="header__actions">
                <div class="search-bar">
                    <input type="text" class="search-bar__input" placeholder="Search products..."
                        aria-label="Search products">
                    <button class="search-bar__btn" aria-label="Search"><svg xmlns="http://www.w3.org/2000/svg"
                            width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-search">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg></button>
                </div>

                <a href="cart.html" class="cart" aria-label="Shopping cart">
                    <span class="cart__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-cart">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg></span>
                    <span class="cart__badge" id="cartBadge">0</span>
                </a>

                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="hamburger__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-menu">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ====== CART PAGE ====== -->
    <main class="main">
        <section class="cart-page" id="cartPage">

            <!-- Breadcrumb -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="index.html" class="breadcrumb__link">Home</a>
                <span class="breadcrumb__sep">›</span>
                <span class="breadcrumb__current">Shopping Cart</span>
            </nav>

            <h1 class="cart-page__title">Your <span class="highlight">Cart</span></h1>

            <!-- Empty State (hidden by default) -->
            <div class="cart-empty" id="cartEmpty" style="display:none;">
                <div class="cart-empty__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="icon-cart">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg></div>
                <h2 class="cart-empty__heading">Your cart is empty.</h2>
                <p class="cart-empty__text">Looks like you haven't added anything yet.</p>
                <a href="index.html#products" class="cart-empty__btn">← Browse Products</a>
            </div>

            <!-- Cart Content (hidden until rendered) -->
            <div class="cart-content" id="cartContent" style="display:none;">

                <!-- Cart Header Row -->
                <div class="cart-table__header">
                    <span class="cart-table__col cart-table__col--product">Product</span>
                    <span class="cart-table__col cart-table__col--price">Price</span>
                    <span class="cart-table__col cart-table__col--qty">Qty</span>
                    <span class="cart-table__col cart-table__col--subtotal">Subtotal</span>
                    <span class="cart-table__col cart-table__col--action"></span>
                </div>

                <!-- Cart Items Container -->
                <div class="cart-items" id="cartItems"></div>

                <!-- Cart Footer: Summary -->
                <div class="cart-summary">
                    <div class="cart-summary__row">
                        <span class="cart-summary__label">Items:</span>
                        <span class="cart-summary__value" id="summaryItemCount">0</span>
                    </div>
                    <div class="cart-summary__row cart-summary__row--total">
                        <span class="cart-summary__label">Total:</span>
                        <span class="cart-summary__value cart-summary__total" id="summaryTotal">$0.00</span>
                    </div>

                    <div class="cart-summary__actions">
                        <a href="index.html#products" class="cart-summary__continue-btn">
                            ← Continue Shopping
                        </a>
                        <button class="cart-summary__checkout-btn" id="checkoutBtn">
                            Proceed to Checkout →
                        </button>
                    </div>

                    <button class="cart-summary__clear-btn" id="clearCartBtn">
                        🗑️ Clear Entire Cart
                    </button>
                </div>

            </div>

        </section>
    </main>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer="defer"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer="defer"></script>

    <script src="scripts/cart.min.js" defer="defer"></script>
    <script src="scripts/firebase-config.js" defer="defer"></script>
    <script src="scripts/cart-page.min.js" defer="defer"></script>
</body>

</html>
