<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — E-Shop</title>
    <meta name="description" content="Review your shopping cart, update quantities, and proceed to checkout.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ====== HEADER / NAVBAR ====== -->
    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">
                <span class="logo-icon">🛍️</span>
                <span class="logo-text">E-Shop</span>
            </a>

            <nav class="header__nav" id="navMenu">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                    <li class="nav__item"><a href="index.html#products" class="nav__link">Products</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                </ul>
            </nav>

            <div class="header__actions">
                <div class="search-bar">
                    <input type="text" class="search-bar__input" placeholder="Search products..."
                        aria-label="Search products">
                    <button class="search-bar__btn" aria-label="Search">🔍</button>
                </div>

                <a href="cart.html" class="cart" aria-label="Shopping cart">
                    <span class="cart__icon">🛒</span>
                    <span class="cart__badge" id="cartBadge">0</span>
                </a>

                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="hamburger__icon">☰</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ====== CART PAGE ====== -->
    <main class="main">
        <section class="cart-page" id="cartPage">

            <!-- Breadcrumb -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="index.html" class="breadcrumb__link">Home</a>
                <span class="breadcrumb__sep">›</span>
                <span class="breadcrumb__current">Shopping Cart</span>
            </nav>

            <h1 class="cart-page__title">Your <span class="highlight">Cart</span></h1>

            <!-- Empty State (hidden by default) -->
            <div class="cart-empty" id="cartEmpty" style="display:none;">
                <div class="cart-empty__icon">🛒</div>
                <h2 class="cart-empty__heading">Your cart is empty.</h2>
                <p class="cart-empty__text">Looks like you haven't added anything yet.</p>
                <a href="index.html#products" class="cart-empty__btn">← Browse Products</a>
            </div>

            <!-- Cart Content (hidden until rendered) -->
            <div class="cart-content" id="cartContent" style="display:none;">

                <!-- Cart Header Row -->
                <div class="cart-table__header">
                    <span class="cart-table__col cart-table__col--product">Product</span>
                    <span class="cart-table__col cart-table__col--price">Price</span>
                    <span class="cart-table__col cart-table__col--qty">Qty</span>
                    <span class="cart-table__col cart-table__col--subtotal">Subtotal</span>
                    <span class="cart-table__col cart-table__col--action"></span>
                </div>

                <!-- Cart Items Container -->
                <div class="cart-items" id="cartItems"></div>

                <!-- Cart Footer: Summary -->
                <div class="cart-summary">
                    <div class="cart-summary__row">
                        <span class="cart-summary__label">Items:</span>
                        <span class="cart-summary__value" id="summaryItemCount">0</span>
                    </div>
                    <div class="cart-summary__row cart-summary__row--total">
                        <span class="cart-summary__label">Total:</span>
                        <span class="cart-summary__value cart-summary__total" id="summaryTotal">$0.00</span>
                    </div>

                    <div class="cart-summary__actions">
                        <a href="index.html#products" class="cart-summary__continue-btn">
                            ← Continue Shopping
                        </a>
                        <button class="cart-summary__checkout-btn" id="checkoutBtn">
                            Proceed to Checkout →
                        </button>
                    </div>

                    <button class="cart-summary__clear-btn" id="clearCartBtn">
                        🗑️ Clear Entire Cart
                    </button>
                </div>

            </div>

        </section>
    </main>

    <script src="scripts/cart.js"></script>
    <script src="scripts/cart-page.js"></script>
</body>

</html>
