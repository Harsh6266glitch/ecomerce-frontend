<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Frontend</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ====== HEADER / NAVBAR ====== -->
    <header class="header">
        <div class="header__container">

            <!-- Logo -->
            <a href="#" class="header__logo">
                <span class="logo-icon">🛍️</span>
                <span class="logo-text">E-Shop</span>
            </a>

            <!-- Navigation Links -->
            <nav class="header__nav" id="navMenu">
                <ul class="nav__list">
                    <li class="nav__item"><a href="#" class="nav__link active">Home</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Products</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                </ul>
            </nav>

            <!-- Right Actions: Search + Cart + Hamburger -->
            <div class="header__actions">

                <!-- Search Bar -->
                <div class="search-bar">
                    <input type="text" class="search-bar__input" placeholder="Search products..."
                        aria-label="Search products">
                    <button class="search-bar__btn" aria-label="Search">🔍</button>
                </div>

                <!-- Cart Icon -->
                <a href="#" class="cart" aria-label="Shopping cart">
                    <span class="cart__icon">🛒</span>
                    <span class="cart__badge">3</span>
                </a>

                <!-- Hamburger Menu (mobile) -->
                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="hamburger__icon">☰</span>
                </button>

            </div>
        </div>
    </header>

    <!-- ====== HERO SECTION ====== -->
    <main class="main">
        <section class="hero">

            <!-- Animated background shapes -->
            <div class="hero__shapes">
                <div class="shape shape--1"></div>
                <div class="shape shape--2"></div>
                <div class="shape shape--3"></div>
            </div>

            <div class="hero__content">
                <span class="hero__badge">🔥 Limited Time Offer</span>
                <h1 class="hero__title">
                    Biggest Sale<br>
                    of the <span class="highlight">Year!</span>
                </h1>
                <p class="hero__subtitle">
                    Up to <strong>50% off</strong> on all premium products.<br>
                    Don't miss out — deals end soon.
                </p>
                <div class="hero__actions">
                    <a href="#" class="hero__cta hero__cta--primary">Shop Now →</a>
                    <a href="#" class="hero__cta hero__cta--outline">Browse Deals</a>
                </div>

                <!-- Stats strip -->
                <div class="hero__stats">
                    <div class="stat">
                        <span class="stat__number">200+</span>
                        <span class="stat__label">Products</span>
                    </div>
                    <div class="stat">
                        <span class="stat__number">50%</span>
                        <span class="stat__label">Max Discount</span>
                    </div>
                    <div class="stat">
                        <span class="stat__number">24h</span>
                        <span class="stat__label">Fast Delivery</span>
                    </div>
                </div>
            </div>

            <!-- Floating product cards -->
            <div class="hero__visual">
                <div class="floating-card floating-card--1">
                    <div class="floating-card__emoji">👟</div>
                    <div class="floating-card__price">$49.99</div>
                </div>
                <div class="floating-card floating-card--2">
                    <div class="floating-card__emoji">🎧</div>
                    <div class="floating-card__price">$29.99</div>
                </div>
                <div class="floating-card floating-card--3">
                    <div class="floating-card__emoji">⌚</div>
                    <div class="floating-card__price">$99.99</div>
                </div>
            </div>

        </section>
    </main>

    <script src="scripts/app.js"></script>
</body>

</html>
