<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — E-Shop</title>
    <meta name="description" content="View product details, pricing, and add items to your cart.">
    <link rel="stylesheet" href="styles/main.min.css">
</head>

<body>

    <!-- ====== HEADER / NAVBAR ====== -->
    <header class="header">
        <div class="header__container">

            <!-- Logo -->
            <a href="index.html" class="header__logo">
                <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="icon-logo">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg></span>
                <span class="logo-text">E-Shop</span>
            </a>

            <!-- Navigation Links -->
            <nav class="header__nav" id="navMenu">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                    <li class="nav__item"><a href="index.html#products" class="nav__link active">Products</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                    <li class="nav__item" id="authNavItem"><a href="login.html" class="nav__link">Login</a></li>
                </ul>
            </nav>

            <!-- Right Actions -->
            <div class="header__actions">

                <!-- Search Bar -->
                <div class="search-bar">
                    <input type="text" class="search-bar__input" placeholder="Search products..."
                        aria-label="Search products">
                    <button class="search-bar__btn" aria-label="Search"><svg xmlns="http://www.w3.org/2000/svg"
                            width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-search">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg></button>
                </div>

                <!-- Cart Icon -->
                <a href="cart.html" class="cart" aria-label="Shopping cart">
                    <span class="cart__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-cart">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg></span>
                    <span class="cart__badge" id="cartBadge">0</span>
                </a>

                <!-- Hamburger Menu (mobile) -->
                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="hamburger__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-menu">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg></span>
                </button>

            </div>
        </div>
    </header>

    <!-- ====== PRODUCT DETAIL ====== -->
    <main class="main">
        <section class="product-detail" id="productDetail">

            <!-- Breadcrumb -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="index.html" class="breadcrumb__link">Home</a>
                <span class="breadcrumb__sep">›</span>
                <a href="index.html#products" class="breadcrumb__link">Products</a>
                <span class="breadcrumb__sep">›</span>
                <span class="breadcrumb__current" id="breadcrumbTitle">Loading...</span>
            </nav>

            <!-- Loading State -->
            <div class="detail__loader" id="detailLoader">
                <div class="detail__loader-spinner"></div>
                <p>Loading product details...</p>
            </div>

            <!-- Error State -->
            <div class="detail__error" id="detailError" style="display:none;">
                <p>⚠️ Failed to load product. Please try again later.</p>
                <a href="index.html" class="detail__back-btn">← Back to Shop</a>
            </div>

            <!-- Product Content (hidden until loaded) -->
            <div class="detail__content" id="detailContent" style="display:none;">

                <!-- Left: Image with Zoom -->
                <div class="detail__image-container">
                    <div class="detail__image-wrapper" id="imageZoomWrapper">
                        <img class="detail__image" id="detailImage" src="" alt="" loading="lazy">
                        <div class="detail__zoom-lens" id="zoomLens"></div>
                    </div>
                    <p class="detail__zoom-hint"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-search">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg> Hover to zoom</p>
                </div>

                <!-- Right: Info -->
                <div class="detail__info">
                    <span class="detail__category" id="detailCategory"></span>
                    <h1 class="detail__title" id="detailTitle"></h1>

                    <div class="detail__rating" id="detailRating">
                        <span class="detail__stars"></span>
                        <span class="detail__rating-count"></span>
                    </div>

                    <p class="detail__price" id="detailPrice"></p>
                    <p class="detail__description" id="detailDescription"></p>

                    <!-- Variations: Size -->
                    <div class="variation" id="variationSize">
                        <label class="variation__label">Size</label>
                        <div class="variation__options">
                            <button class="variation__btn variation__btn--size active" data-value="S">S</button>
                            <button class="variation__btn variation__btn--size" data-value="M">M</button>
                            <button class="variation__btn variation__btn--size" data-value="L">L</button>
                            <button class="variation__btn variation__btn--size variation__btn--disabled" data-value="XL"
                                disabled>XL</button>
                        </div>
                    </div>

                    <!-- Variations: Color -->
                    <div class="variation" id="variationColor">
                        <label class="variation__label">Color</label>
                        <div class="variation__options">
                            <button class="variation__btn variation__btn--color active" data-value="Black"
                                style="--swatch-color: #1a1a2e;" title="Black">
                                <span class="color-swatch"></span> Black
                            </button>
                            <button class="variation__btn variation__btn--color" data-value="Blue"
                                style="--swatch-color: #3498db;" title="Blue">
                                <span class="color-swatch"></span> Blue
                            </button>
                            <button class="variation__btn variation__btn--color" data-value="Red"
                                style="--swatch-color: #e74c3c;" title="Red">
                                <span class="color-swatch"></span> Red
                            </button>
                            <button class="variation__btn variation__btn--color variation__btn--disabled"
                                data-value="Yellow" style="--swatch-color: #f1c40f;" title="Yellow (Unavailable)"
                                disabled>
                                <span class="color-swatch"></span> Yellow
                            </button>
                        </div>
                    </div>

                    <!-- Quantity Selector -->
                    <div class="quantity-selector">
                        <label class="quantity-selector__label">Quantity</label>
                        <div class="quantity-selector__controls">
                            <button class="quantity-selector__btn" id="qtyMinus"
                                aria-label="Decrease quantity">−</button>
                            <span class="quantity-selector__value" id="qtyValue">1</span>
                            <button class="quantity-selector__btn" id="qtyPlus"
                                aria-label="Increase quantity">+</button>
                        </div>
                    </div>

                    <!-- Total Price -->
                    <div class="detail__total">
                        <span class="detail__total-label">Total:</span>
                        <span class="detail__total-price" id="detailTotalPrice">$0.00</span>
                    </div>

                    <!-- Actions -->
                    <div class="detail__actions">
                        <button class="detail__add-btn" id="detailAddBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="icon-cart">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg> Add to Cart
                        </button>
                        <a href="index.html#products" class="detail__continue-btn">
                            ← Continue Shopping
                        </a>
                    </div>

                    <!-- Cart confirmation -->
                    <div class="detail__confirmation" id="detailConfirmation" style="display:none;">
                        <span class="confirmation__icon">✅</span>
                        <span class="confirmation__text">Item added to cart!</span>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer="defer"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer="defer"></script>

    <script src="scripts/cart.min.js" defer="defer"></script>
    <script src="scripts/firebase-config.js" defer="defer"></script>
    <script src="scripts/product.min.js" defer="defer"></script>
</body>

</html>
