<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — E-Shop</title>
    <meta name="description" content="Log in to your E-Shop account to manage orders and shopping cart.">
    <link rel="stylesheet" href="styles/main.min.css">
</head>

<body>

    <!-- ====== HEADER ====== -->
    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">
                <span class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="icon-logo">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg></span>
                <span class="logo-text">E-Shop</span>
            </a>
            <nav class="header__nav" id="navMenu">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                    <li class="nav__item"><a href="index.html#products" class="nav__link">Products</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                    <li class="nav__item" id="authNavItem"><a href="login.html" class="nav__link">Login</a></li>
                </ul>
            </nav>
            <div class="header__actions">
                <a href="cart.html" class="cart" aria-label="Shopping cart">
                    <span class="cart__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-cart">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg></span>
                    <span class="cart__badge" id="cartBadge">0</span>
                </a>
                <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="hamburger__icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" class="icon-menu">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ====== LOGIN PAGE ====== -->
    <main class="main">
        <section class="auth-page">
            <div class="auth-card">

                <!-- Card Header -->
                <div class="auth-card__header">
                    <h1 class="auth-card__title">Welcome Back</h1>
                    <p class="auth-card__subtitle">Log in to your account</p>
                </div>

                <!-- Login Form -->
                <form class="auth-form" id="loginForm" novalidate>

                    <!-- Email -->
                    <div class="form-group">
                        <label class="form-group__label" for="loginEmail">Email Address</label>
                        <div class="form-group__input-wrapper">
                            <span class="form-group__icon">📧</span>
                            <input type="email" class="form-group__input" id="loginEmail" placeholder="you@example.com"
                                autocomplete="email" required>
                        </div>
                        <span class="form-group__error" id="loginEmailError"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-group__label" for="loginPassword">Password</label>
                        <div class="form-group__input-wrapper">
                            <span class="form-group__icon">🔒</span>
                            <input type="password" class="form-group__input" id="loginPassword"
                                placeholder="Enter your password" autocomplete="current-password" required>
                            <button type="button" class="form-group__toggle-pw" id="toggleLoginPw"
                                aria-label="Toggle password visibility">
                                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <span class="form-group__error" id="loginPasswordError"></span>
                    </div>

                    <!-- Forgot Password -->
                    <div class="auth-form__options">
                        <a href="#" class="auth-form__forgot"
                            onclick="alert('Password reset is not available in this demo.')">Forgot Password?</a>
                    </div>

                    <!-- Global Error -->
                    <div class="auth-form__message auth-form__message--error" id="loginGlobalError"
                        style="display:none;"></div>

                    <!-- Submit -->
                    <button type="submit" class="auth-form__submit-btn" id="loginBtn">
                        Log In
                    </button>

                </form>

                <!-- Footer -->
                <div class="auth-card__footer">
                    <p>Don't have an account? <a href="signup.html" class="auth-card__link">Sign Up</a></p>
                </div>

            </div>
        </section>
    </main>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer="defer"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer="defer"></script>

    <script src="scripts/cart.min.js" defer="defer"></script>
    <script src="scripts/firebase-config.js" defer="defer"></script>
    <script src="scripts/auth.min.js" defer="defer"></script>
</body>

</html>
